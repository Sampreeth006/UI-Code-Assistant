<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding: 20px;
      background: linear-gradient(to right, #f0f2f5, #e6ecf0);
      background-color: #8bbaea;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .dashboard-container {
      background-color: #aae6f7;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .main-header-wrapper {
      background-color: #1a5370; /* soft blue */
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      border-radius: 8px;
      position: sticky;
      top: 0;
      z-index: 1000;
    } 
    
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .main-nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 15px;
    }

    .main-nav a {
      text-decoration: none;
      color: #007bff;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      background-color: #007bff;
      color: white;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .form-label {
      font-weight: 500;
    }

    #preview {
      border: 1px solid #dee2e6;
      min-height: 200px;
      padding: 15px;
      margin-top: 15px;
      background-color: #ffffff;
      border-radius: 8px;
    }

    textarea {
      resize: vertical;
      font-family: monospace;
      font-size: 0.9rem;
      background-color: #f1f3f5;
      border-radius: 6px;
      border: 1px solid #ced4da;
    }

    h1, h4 {
      color: #343a40;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <header class="main-header-wrapper container d-flex justify-content-between align-items-center py-3"">
      <div class="logo fs-2 fw-bold">UI Code Assistant</div>
      <nav class="main-nav">
        <ul>
          <li><a href="user.html" class="active">Dashboard</a></li>
          <li><a href="syntax.html" class="active">Live Syntax</a></li>
          <li><a href="#" class="active">Code Beautifier</a></li>
          <li><a href="suggestion.html" class="active">suggestion Engine</a></li>
        </ul>
      </nav>
      <div class="user-menu">
        <div class="user-profile">
          <span class="user-avatar">U</span>
        </div>
        <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="welcome-section mb-4">
        <h1>Beautification Section</h1>
        <div class="my-4 p-4 border rounded shadow-sm bg-light">
            <h4>Code Beautifier</h4>
            <div class="col-md-6">
              <label for="beautifyLanguage" class="form-label">Select Language</label>
              <select id="beautifyLanguage" class="form-select">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
              </select>
            </div>
          
            <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="beautifyInput" class="form-label">Paste Code</label>
                  <textarea id="beautifyInput" class="form-control" rows="8" placeholder="Paste your code here..."></textarea>
                </div>
                
                <div class="col-md-6 mb-3">
                  <label for="beautifyOutput" class="form-label">Beautified Code</label>
                  <textarea id="beautifyOutput" class="form-control" rows="8" placeholder="Beautified code will appear here..." readonly></textarea>
                </div>
              </div>
              <button class="btn btn-primary mb-3" id="beautifyBtn">Beautify Code</button>

          </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-beautify@1.14.7/js/lib/beautify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-beautify@1.14.7/js/lib/beautify-html.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-beautify@1.14.7/js/lib/beautify-css.min.js"></script>

    <script>
        document.getElementById("beautifyBtn").addEventListener("click", () => {
        const lang = document.getElementById("beautifyLanguage").value;
        const code = document.getElementById("beautifyInput").value;
        let result = "";

        switch (lang) {
            case "html":
                result = html_beautify(code, { indent_size: 2 });
            break;
            case "css":
                result = css_beautify(code, { indent_size: 2 });
            break;
            case "js":
                result = js_beautify(code, { indent_size: 2 });
            break;
        }

        document.getElementById("beautifyOutput").value = result;
    });

    document.addEventListener('DOMContentLoaded', function () {
          const logoutBtn = document.getElementById('logoutBtn');
          const codeInput = document.getElementById('codeInput');
          const feedback = document.getElementById('liveSyntaxFeedback');
          const checkSyntaxBtn = document.getElementById('checkSyntaxBtn');
      
          logoutBtn.addEventListener('click', () => {
            alert('You have been logged out.');
            window.location.href = 'index.html'; 
          });
        });
    </script>
  </body>
  </html>
