<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Code Assistant</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input[type="password"],
        input[type="text"] {
            font-family: inherit;
            font-size: 1rem;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }          
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>UI Code Assistant</h1>
            
            <form action="user.html" method="get" id="loginForm">
                
                <div id="loginMessage" style="color: red; margin-top: 10px;"></div>

                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                  </div>
                  
                  <div class="checkbox-group">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword">Show Password</label>
                  </div>

                  <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                  
                <button type="submit" class="login-btn">Login</button>
                
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
                
                <div class="continue-without">
                    <a href="guest.html" id="continueWithoutLogin">Continue without login</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
